name: CI/CD — Test, Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  SAM_CLI_TELEMETRY: 0
  PYTHON_VERSION: "3.13"
  NODE_VERSION: "20"

jobs:
  # ─────────────────────────────────────────────
  # 1. Backend tests
  # ─────────────────────────────────────────────
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -r backend/layers/shared/python/requirements.txt
          pip install pytest moto boto3 requests-mock

      - name: Run unit tests
        run: |
          PYTHONPATH=backend/layers/shared/python:backend \
          pytest backend/tests -v -m "not integration" --tb=short

  # ─────────────────────────────────────────────
  # 2. Frontend type check & build
  # ─────────────────────────────────────────────
  test-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Upload frontend build
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  # ─────────────────────────────────────────────
  # 3. Deploy (only on push to main)
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to AWS
    needs: [test-backend, test-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: aws-actions/setup-sam@v2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: SAM build
        run: sam build

      - name: SAM deploy
        run: |
          sam deploy \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --stack-name samai-monitor \
            --capabilities CAPABILITY_IAM \
            --region ${{ env.AWS_REGION }}

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Get S3 bucket name
        id: stack
        run: |
          BUCKET=$(aws cloudformation describe-stacks \
            --stack-name samai-monitor \
            --query "Stacks[0].Outputs[?OutputKey=='FrontendBucketName'].OutputValue" \
            --output text)
          DISTRIBUTION_ID=$(aws cloudformation describe-stacks \
            --stack-name samai-monitor \
            --query "Stacks[0].Outputs[?OutputKey=='CloudFrontDistributionId'].OutputValue" \
            --output text 2>/dev/null || echo "")
          echo "bucket=$BUCKET" >> "$GITHUB_OUTPUT"
          echo "distribution_id=$DISTRIBUTION_ID" >> "$GITHUB_OUTPUT"

      - name: Sync frontend to S3
        run: |
          aws s3 sync frontend/dist/ s3://${{ steps.stack.outputs.bucket }}/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"
          aws s3 cp frontend/dist/index.html s3://${{ steps.stack.outputs.bucket }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront cache
        if: steps.stack.outputs.distribution_id != ''
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.stack.outputs.distribution_id }} \
            --paths "/*"
